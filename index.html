<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Вход — Marketing Dashboard</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <main class="login-shell">
    <div class="login-inner">
      <h1 class="login-title">Marketing Dashboard</h1>
      <p class="login-subtitle">Войдите, чтобы посмотреть отчет по маркетингу за выбранный месяц.</p>

      <form id="loginForm" autocomplete="off">
        <label class="login-label">
          Имя пользователя
          <input type="text" id="username" class="login-input" required />
        </label>

        <label class="login-label">
          Пароль
          <input type="password" id="password" class="login-input" required />
        </label>

        <div class="login-row">
          <button type="submit" class="btn btn-primary">Войти</button>
        </div>

        <p id="error" class="login-error" aria-live="polite"></p>
      </form>

      <p class="login-meta">Доступ ограничен. Используйте выданные вам логин и пароль.</p>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
